<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#153e5b" />
    <meta name="description" content="E235系たんじょうび号で、8月2日のたんじょうび駅へ毎日1駅ずつ進む3Dカウントダウン。" />
    <link rel="icon" href="./assets/favicon.svg" type="image/svg+xml" />
    <title>E235系 たんじょうび号</title>
  </head>
  <body>
    <div class="app is-loading" id="app">
      <picture class="world-backdrop" aria-hidden="true">
        <source media="(max-width: 720px)" srcset="./assets/e235-coastal-backdrop-mobile-v1.webp" />
        <img src="./assets/e235-coastal-backdrop-desktop-v1.webp" alt="" />
      </picture>
      <canvas class="world-canvas" id="sceneCanvas" aria-hidden="true"></canvas>
      <div class="scene-grade" aria-hidden="true"></div>
      <div class="scene-grain" aria-hidden="true"></div>

      <header class="topbar">
        <div class="brand" aria-label="E235系 たんじょうび号">
          <span class="brand-mark" aria-hidden="true"><i></i><i></i></span>
          <span><small>E235 SERIES</small><strong>たんじょうび号</strong></span>
        </div>
        <button class="sound-toggle" id="soundToggle" type="button" aria-pressed="true">
          <span id="soundIcon" aria-hidden="true">♪</span>
          <span id="soundLabel">おと あり</span>
        </button>
      </header>

      <main class="experience" id="experience">
        <section class="station-hud" aria-labelledby="stationHeading">
          <div class="station-line" aria-hidden="true"><span></span></div>
          <p class="station-kicker" id="stationKicker">きのうの えきから</p>
          <h1 id="stationHeading">
            <span id="stationPrefix">あと</span>
            <strong id="stationDays">13</strong>
            <span id="stationUnit">にちえき</span>
          </h1>
          <p class="today-meta" id="todayMeta">きょう 7がつ21にち</p>
        </section>

        <section class="journey-guide" aria-label="たんじょうび駅までの案内">
          <div class="guide-copy">
            <span class="guide-label">つぎの えき</span>
            <strong id="destinationName">あと12にちえき</strong>
            <small id="proximityMessage">たんじょうびえきが みえてきたよ</small>
          </div>
          <div class="journey-track" aria-hidden="true">
            <span class="track-fill" id="journeyFill"></span>
            <span class="track-train" id="journeyTrainIcon"><i></i></span>
            <span class="track-goal">🎂</span>
          </div>
          <div class="station-pass" id="stationPass" aria-live="polite"></div>
        </section>

        <div class="journey-status" id="journeyStatus" role="status" aria-live="polite">
          E235けいが しゅっぱつを まっているよ
        </div>

        <div class="primary-controls">
          <button class="depart-control" id="departButton" type="button" aria-describedby="controlHint">
            <span class="signal-lens" aria-hidden="true"><i></i></span>
            <span class="depart-copy">
              <small>きょうの えきへ</small>
              <strong id="departLabel">ゆっくり しゅっぱつ</strong>
            </span>
            <span class="depart-arrow" aria-hidden="true">›</span>
          </button>
          <p id="controlHint">ボタンを おすと、のこりにっすうが 1つ へるよ</p>
        </div>
      </main>

      <aside class="arrival-panel" id="arrivalPanel" role="dialog" aria-modal="true" aria-labelledby="arrivalTitle" aria-describedby="arrivalMessage" hidden>
        <div class="arrival-medal" aria-hidden="true">★</div>
        <p>きょうの えきに</p>
        <h2 id="arrivalTitle">とうちゃく！</h2>
        <div class="arrival-station-name" id="arrivalStationName">あと12にちえき</div>
        <p class="arrival-message" id="arrivalMessage">たんじょうびえきが もっと ちかくなったよ</p>
        <div class="arrival-actions">
          <button id="replayButton" type="button">もういちど はしる！</button>
          <button id="restButton" type="button">えきで ひとやすみ</button>
        </div>
      </aside>

      <div class="loading-screen" id="loadingScreen" role="status" aria-live="polite">
        <span class="loading-train" aria-hidden="true"><i></i><i></i><i></i></span>
        <strong>E235けいを じゅんびちゅう</strong>
        <small>せんろと えきを つくっています</small>
      </div>

      <div class="webgl-fallback" id="webglFallback" hidden>
        <p>E235けいを かるいモードで うんてんします</p>
      </div>
    </div>
    <script type="module" src="/src/app.ts"></script>
  </body>
</html>
