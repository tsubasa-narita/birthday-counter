<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f8cd57" />
    <meta name="description" content="8月2日の3歳のお誕生日まで、たんじょうび号と一緒に毎日を数えるカウントダウンアプリです。" />
    <title>たんじょうび号｜8月2日まであと何日？</title>
    <link rel="icon" href="assets/favicon.svg" type="image/svg+xml" />
    <link rel="preload" href="assets/birthday-train.webp" as="image" type="image/webp" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app" id="app">
      <img class="hero-art" src="assets/birthday-train.webp" alt="お花畑を走って、お誕生日の駅へ向かう青い蒸気機関車" />
      <div class="sky-glow" aria-hidden="true"></div>

      <header class="topbar">
        <div class="brand" aria-label="たんじょうび号">
          <span class="brand-mark" aria-hidden="true">🚂</span>
          <span>たんじょうび号</span>
        </div>
        <div class="date-chip" id="todayLabel">きょう</div>
      </header>

      <section class="countdown-card" aria-labelledby="countdownTitle" aria-live="polite">
        <p class="eyebrow" id="eyebrow">8がつ2にちまで</p>
        <div class="countdown" id="countdownDisplay">
          <span class="count-prefix">あと</span>
          <span class="count-number" id="daysNumber">14</span>
          <span class="count-unit">にち</span>
        </div>
        <h1 id="countdownTitle">3さいのおたんじょうびへ<br /><span>しゅっぱつ しんこう！</span></h1>

        <div class="journey" id="journey" aria-label="お誕生日までの線路">
          <div class="journey-labels">
            <span>きょう</span>
            <span>🎂 おたんじょうび</span>
          </div>
          <div class="track">
            <div class="track-fill" id="trackFill"></div>
            <div class="mini-train" id="miniTrain" aria-hidden="true">🚂</div>
          </div>
          <p class="journey-note" id="journeyNote">きょうも ひとつ えきに ついたよ！</p>
        </div>

        <button class="depart-button" id="departButton" type="button">
          <span class="button-icon" aria-hidden="true">♪</span>
          <span id="buttonLabel">きてきを ならす</span>
        </button>
      </section>

      <p class="footer-note">まいにち ひとつずつ、おおきくなるね</p>
      <div class="confetti" id="confetti" aria-hidden="true"></div>
    </main>
    <script src="app.js"></script>
  </body>
</html>
